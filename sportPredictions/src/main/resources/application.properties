spring.application.name=sportPredictions
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.connection.characterEncoding=utf-8
spring.jpa.properties.hibernate.connection.CharSet=utf-8
spring.jpa.properties.hibernate.connection.useUnicode=true

# Flyway
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Football API
football.api.key=${FOOTBALL_API_KEY}
football.api.base-url=${FOOTBALL_API_BASE_URL}
football.api.token-header=${FOOTBALL_API_TOKEN_HEADER}

# JWT
jwt.secret=${JWT_SECRET}

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# MVC
spring.mvc.contentnegotiation.media-types.json=application/json

# Scheduler
scheduler.cron=00 00 06 * * *
scheduler.telegram-cron=0 0 10 * * *

# Telegram Bot
telegram.enabled=true
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.username=${TELEGRAM_BOT_USERNAME}
telegram.admin.chat-id=${TELEGRAM_ADMIN_CHAT_ID}