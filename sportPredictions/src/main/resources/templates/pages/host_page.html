<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Predictions</title>
    <link rel="stylesheet" type="text/css" href="/css/host_page.css"/><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/6.6.6/css/flag-icons.min.css"/>
    <link rel="icon" href="/ico/favicon.ico" type="image/x-icon">
</head>
<body>
<div class="site-header">
    <span class="site-logo">&#9917;</span>
    <h1 class="site-title">Sport Predictions</h1>
</div>
<div id="message" class="message"></div>
<div class="forms-wrapper">
    <div class="container">
        <div class="panel-header" data-i18n="auth.registration">Registration</div>
        <div class="form-content">
            <form id="registrationForm" action="/register" method="post">
                <label for="register-login" data-i18n="auth.login_label">Login:</label>
                <input data-i18n="auth.login_placeholder" placeholder="Enter your username"
                       type="text"
                       id="register-login"
                       name="login"
                       required
                       autocomplete="username">
                <label for="register-password" data-i18n="auth.password_label">Password:</label>
                <input data-i18n="auth.password_placeholder" placeholder="Enter password" type="password" id="register-password" name="password" required
                       autocomplete="new-password">
                <label for="register-confirm-password" data-i18n="auth.confirm_password_label">Confirm your password:</label>
                <input data-i18n="auth.confirm_password_placeholder" placeholder="Repeat your password" type="password" id="register-confirm-password"
                       name="confirm_password" required autocomplete="new-password">
                <button type="submit" data-i18n="auth.register_btn">Register</button>
            </form>
        </div>
    </div>
    <div class="login-panel-wrapper">
        <div class="lang-switcher">
            <button class="lang-btn" id="lang-en" onclick="setLanguage('en')" title="English">
                <span class="fi fi-gb"></span>
            </button>
            <button class="lang-btn" id="lang-uk" onclick="setLanguage('uk')" title="Українська">
                <span class="fi fi-ua"></span>
            </button>
        </div>
        <div class="container">
            <div class="panel-header" data-i18n="auth.login_panel">Login</div>
            <div class="form-content">
                <form id="loginForm" action="/login" method="post">
                    <label for="login-login" data-i18n="auth.login_label">Login:</label>
                    <input data-i18n="auth.login_placeholder" placeholder="Enter your username" type="text" id="login-login" name="login" required autocomplete="username">
                    <label for="login-password" data-i18n="auth.password_label">Password:</label>
                    <input data-i18n="auth.password_placeholder" placeholder="Enter your password" type="password" id="login-password" name="password" required
                           autocomplete="current-password">
                    <button type="submit" data-i18n="auth.enter_btn">Enter</button>
                </form>
                <div class="rules-link-wrapper">
                    <a href="/rules?from=host" class="rules-link-btn" data-i18n="auth.rules_link">&#128214; Rules</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="/script/i18n.js"></script>
<script src="/script/host_page.js"></script>
</body>
</html>
